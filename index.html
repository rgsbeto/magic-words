function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function ConfettiEffect({show}){if(!show)return null;const p=Array.from({length:30},(_,i)=>({id:i,left:Math.random()*100,delay:Math.random()*0.5,color:["#FF6B6B","#4ECDC4","#FFD93D","#6C5CE7","#FF9FF3","#54A0FF"][Math.floor(Math.random()*6)],size:8+Math.random()*12}));return<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,pointerEvents:"none",zIndex:9999,overflow:"hidden"}}>{p.map(p=><div key={p.id} style={{position:"absolute",top:-20,left:`${p.left}%`,width:p.size,height:p.size,backgroundColor:p.color,borderRadius:p.size>14?"50%":"2px",animation:`confettiFall 2s ease-in ${p.delay}s forwards`}}/>)}</div>;}

function VowelFinder({onBack}){const[tv,setTv]=useState("a");const[grid,setGrid]=useState(()=>genGrid());const[tapped,setTapped]=useState(new Set());const[score,setScore]=useState(0);const[showC,setShowC]=useState(false);const total=grid.filter(v=>v===tv).length;const handleTap=(i,e)=>{if(tapped.has(i))return;if(grid[i]===tv){setTapped(p=>new Set([...p,i]));setScore(p=>p+1);if(score+1===total){setShowC(true);setTimeout(()=>setShowC(false),2500);}}};const next=()=>{const vs=["a","e","i","o","u"];setTv(vs[(vs.indexOf(tv)+1)%5]);setGrid(genGrid());setTapped(new Set());setScore(0);};return<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FFECD2 0%,#FCB69F 100%)",padding:"16px 12px"}}><ConfettiEffect show={showC}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><button onClick={onBack} style={S.backBtn}>← Menú</button><ScoreBar score={score} total={total}/></div><div style={{textAlign:"center",marginBottom:12}}><div style={{display:"inline-flex",alignItems:"center",gap:14,background:"white",padding:"10px 28px",borderRadius:24,boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}><span style={{fontSize:20,fontWeight:600,color:"#555"}}>Toca la letra:</span><span style={{fontSize:52,fontWeight:800,color:VOWEL_COLORS[tv],lineHeight:1}}>{tv}</span></div></div><div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:6,maxWidth:500,margin:"0 auto"}}>{grid.map((l,i)=>{const it=tapped.has(i);return<button key={i} onClick={e=>handleTap(i,e)} style={{width:"100%",aspectRatio:"1",borderRadius:"50%",border:`3px solid ${it?VOWEL_COLORS[tv]:"#ddd"}`,background:it?VOWEL_COLORS[tv]:"white",color:it?"white":"#555",fontSize:22,fontWeight:700,cursor:"pointer",transition:"all 0.2s",transform:it?"scale(0.9)":"scale(1)"}}>{l}</button>})}</div>{score===total&&<div style={{textAlign:"center",marginTop:16}}><div style={{fontSize:28}}>🎉 ¡Muy bien!</div><button onClick={next} style={{...S.primaryBtn,background:VOWEL_COLORS[tv],marginTop:8}}>Siguiente vocal →</button></div>}</div>;}

function SyllableComplete({letter,onBack}){const all=SYLLABLE_WORDS[letter];const[words,setWords]=useState(()=>shuffle(all).slice(0,10));const[ci,setCi]=useState(0);const[score,setScore]=useState(0);const[sel,setSel]=useState(null);const[showC,setShowC]=useState(false);const syls=[`${letter}A`,`${letter}E`,`${letter}I`,`${letter}O`,`${letter}U`];const cur=words[ci];const correct=cur.parts[cur.blank].replace(/[ÁÉÍÓÚ]/g,m=>({Á:"A",É:"E",Í:"I",Ó:"O",Ú:"U"}[m]));const handle=(s)=>{if(sel!==null)return;setSel(s);if(s===correct){setScore(p=>p+1);if(ci===words.length-1){setShowC(true);setTimeout(()=>setShowC(false),2500);}}setTimeout(()=>{if(ci<words.length-1){setCi(p=>p+1);setSel(null);}},1200);};const reset=()=>{setWords(shuffle(all).slice(0,10));setCi(0);setScore(0);setSel(null);};const color=CONSONANT_COLORS[letter];return<div style={{minHeight:"100vh",background:`linear-gradient(135deg,${color}22 0%,${color}44 100%)`,padding:"16px 12px"}}><ConfettiEffect show={showC}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><button onClick={onBack} style={S.backBtn}>← Menú</button><ScoreBar score={score} total={words.length}/></div><div style={{textAlign:"center",marginBottom:8}}><span style={{background:color,color:"white",padding:"6px 24px",borderRadius:20,fontSize:18,fontWeight:700}}>Sílabas con {letter} ({ci+1}/{words.length})</span></div><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,marginTop:16}}><div style={{fontSize:80,lineHeight:1}}>{cur.emoji}</div><div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap",justifyContent:"center"}}>{cur.parts.map((p,i)=><span key={i} style={{fontSize:42,fontWeight:800,color:i===cur.blank?color:"#333",background:i===cur.blank?(sel?(sel===correct?"#C8E6C9":"#FFCDD2"):`${color}20`):"transparent",padding:"4px 12px",borderRadius:12,minWidth:60,textAlign:"center",border:i===cur.blank?`3px dashed ${color}`:"none"}}>{i===cur.blank?(sel||"___"):p}</span>)}</div>{sel&&<div style={{fontSize:36,animation:"popIn 0.3s ease"}}>{sel===correct?"✅ ¡Correcto!":"❌ Intenta de nuevo"}</div>}<div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",marginTop:8}}>{syls.map(s=><button key={s} onClick={()=>handle(s)} disabled={sel!==null} style={{fontSize:30,fontWeight:700,padding:"12px 24px",borderRadius:16,border:`3px solid ${color}`,background:sel===s?(s===correct?"#4CAF50":"#F44336"):"white",color:sel===s?"white":color,cursor:sel?"default":"pointer",minWidth:70,opacity:sel&&sel!==s?0.5:1}}>{s}</button>)}</div></div>{ci===words.length-1&&sel&&<div style={{textAlign:"center",marginTop:24}}><div style={{fontSize:28,marginBottom:12}}>🌟 {score}/{words.length}</div><button onClick={reset} style={{...S.primaryBtn,background:color}}>Jugar de nuevo 🔄</button></div>}</div>;}

function ReadingComp({onBack}){const[si,setSi]=useState(0);const[qi,setQi]=useState(-1);const[ans,setAns]=useState({});const[showC,setShowC]=useState(false);const st=READING_STORIES[si];const score=Object.values(ans).filter(a=>a.correct).length;const hAns=(qI,aI)=>{if(ans[qI]!==undefined)return;const c=st.questions[qI].answer===aI;setAns(p=>({...p,[qI]:{selected:aI,correct:c}}));if(Object.keys(ans).length+1===st.questions.length&&c){setShowC(true);setTimeout(()=>setShowC(false),2500);}};const next=()=>{setSi((si+1)%READING_STORIES.length);setQi(-1);setAns({});};return<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#E8F5E9 0%,#C8E6C9 100%)",padding:"16px 12px"}}><ConfettiEffect show={showC}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><button onClick={onBack} style={S.backBtn}>← Menú</button><ScoreBar score={score} total={st.questions.length}/></div>{qi===-1?<div style={{maxWidth:500,margin:"0 auto"}}><div style={{background:"white",borderRadius:24,padding:24,boxShadow:"0 8px 32px rgba(0,0,0,0.1)"}}><div style={{textAlign:"center",marginBottom:16}}><span style={{fontSize:64}}>{st.emoji}</span><h2 style={{fontSize:28,color:"#2E7D32",margin:"8px 0"}}>{st.title}</h2></div><div style={{fontSize:22,lineHeight:1.8,color:"#333",textAlign:"center",whiteSpace:"pre-line"}}>{st.text}</div></div><div style={{textAlign:"center",marginTop:20}}><button onClick={()=>setQi(0)} style={{...S.primaryBtn,background:"#4CAF50",fontSize:22}}>📝 Responder preguntas</button></div></div>:<div style={{maxWidth:500,margin:"0 auto"}}><div style={{textAlign:"center",marginBottom:12}}><span style={{background:"#4CAF50",color:"white",padding:"6px 20px",borderRadius:20,fontSize:16,fontWeight:700}}>Pregunta {qi+1} de {st.questions.length}</span></div><div style={{background:"white",borderRadius:24,padding:24,boxShadow:"0 8px 32px rgba(0,0,0,0.1)"}}><p style={{fontSize:24,fontWeight:700,color:"#333",textAlign:"center",marginBottom:20 function WordBuilder({onBack}){
  const MAX=10;
  const[slots,setSlots]=useState([null,null]);
  const[words,setWords]=useState([]);
  const[sc,setSc]=useState(2);
  const[phase,setPhase]=useState("build"); // build | review | done
  const[reviews,setReviews]=useState({});
  const[showC,setShowC]=useState(false);
  const vc={A:"#4CAF50",E:"#F44336",I:"#9C27B0",O:"#FFC107",U:"#2196F3"};
  const cls=["M","P","L","S","T","N","D","F"];

  const hCard=(s)=>{const e=slots.indexOf(null);if(e===-1)return;const n=[...slots];n[e]=s;setSlots(n);};
  const rm=(i)=>{const n=[...slots];n[i]=null;setSlots(n);};
  const clear=()=>setSlots(Array(sc).fill(null));
  const chSc=(n)=>{setSlots(Array(n).fill(null));setSc(n);};

  const addWord=()=>{
    if(slots.includes(null))return;
    const w=slots.join("");
    if(words.includes(w))return;
    setWords(p=>[...p,w]);
    setSlots(Array(sc).fill(null));
  };

  const removeWord=(i)=>{setWords(p=>p.filter((_,j)=>j!==i));};

  const startReview=()=>setPhase("review");
  const reviewWord=(i,correct)=>{
    const nr={...reviews,[i]:correct};
    setReviews(nr);
    const answered=Object.keys(nr).length;
    if(answered===words.length){
      const score=Object.values(nr).filter(Boolean).length;
      if(score===words.length){setShowC(true);setTimeout(()=>setShowC(false),2500);}
      setTimeout(()=>setPhase("done"),400);
    }
  };
  const reset=()=>{setSlots([null,null]);setSc(2);setWords([]);setPhase("build");setReviews({});};
  const filled=slots.filter(Boolean).length;
  const score=Object.values(reviews).filter(Boolean).length;
  const full=words.length>=MAX;

  if(phase==="review") return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#E8F5E9 0%,#C8E6C9 100%)",padding:"16px 12px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><button onClick={onBack} style={S.backBtn}>← Menú</button></div>
    <div style={{maxWidth:500,margin:"0 auto",textAlign:"center"}}>
      <div style={{background:"white",borderRadius:20,padding:20,marginBottom:16,boxShadow:"0 4px 16px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:40,marginBottom:8}}>👨‍👩‍👧</div>
        <h2 style={{fontSize:22,color:"#2E7D32",marginBottom:4}}>Revisión de un adulto</h2>
        <p style={{fontSize:16,color:"#888"}}>Toca ✅ si la palabra es correcta o ❌ si no lo es</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {words.map((w,i)=>{
          const r=reviews[i];
          return <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"white",borderRadius:16,padding:"12px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:r===undefined?"2px solid #ddd":r?"2px solid #4CAF50":"2px solid #F44336"}}>
            <span style={{flex:1,fontSize:28,fontWeight:800,color:"#333",letterSpacing:3,textAlign:"left"}}>{w}</span>
            {r===undefined?<>
              <button onClick={()=>reviewWord(i,true)} style={{width:52,height:52,borderRadius:14,border:"none",background:"#C8E6C9",fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✅</button>
              <button onClick={()=>reviewWord(i,false)} style={{width:52,height:52,borderRadius:14,border:"none",background:"#FFCDD2",fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>❌</button>
            </>:<span style={{fontSize:32}}>{r?"✅":"❌"}</span>}
          </div>
        })}
      </div>
    </div>
  </div>;

  if(phase==="done") return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FFF3E0 0%,#FFE0B2 100%)",padding:"16px 12px"}}>
    <ConfettiEffect show={showC}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><button onClick={onBack} style={S.backBtn}>← Menú</button></div>
    <div style={{maxWidth:500,margin:"0 auto",textAlign:"center",marginTop:40}}>
      <div style={{fontSize:72}}>{score===words.length?"🏆":score>=words.length/2?"🌟":"💪"}</div>
      <h2 style={{fontSize:28,color:"#E65100",margin:"12px 0"}}>Resultado</h2>
      <p style={{fontSize:24,color:"#555",marginBottom:8}}>{score} de {words.length} correctas</p>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:16,marginBottom:20}}>
        {words.map((w,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontSize:24,fontWeight:700,color:reviews[i]?"#4CAF50":"#F44336"}}>
          <span>{reviews[i]?"✅":"❌"}</span><span style={{letterSpacing:3}}>{w}</span>
        </div>)}
      </div>
      <button onClick={reset} style={{...S.primaryBtn,background:"#FF9800"}}>Jugar de nuevo 🔄</button>
    </div>
  </div>;

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <button onClick={onBack} style={S.backBtn}>← Menú</button>
      <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.3)",padding:"6px 14px",borderRadius:20}}>

        <span style={{fontWeight:700,fontSize:16,color:"#333"}}>{words.length}/{MAX}</span>
      </div>
    </div>
    <div style={{maxWidth:500,margin:"0 auto",textAlign:"center"}}>
      <h2 style={{fontSize:22,color:"#E65100",margin:"0 0 4px"}}>🧩 ¡Forma palabras!</h2>
      <p style={{fontSize:14,color:"#999",marginBottom:8}}>Forma {MAX} palabras y luego pide a un adulto que las revise</p>

      <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:10}}>

      </div>

      <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:10}}>
        <button onClick={clear} disabled={filled===0} style={{padding:"8px 20px",borderRadius:14,fontSize:15,fontWeight:600,border:"2px solid #ccc",background:"white",color:"#888",cursor:filled===0?"default":"pointer",opacity:filled===0?0.4:1}}>🗑️ Borrar</button>

        <div style={{fontSize:14,color:"#888",marginBottom:8}}>Mis palabras ({words.length}/{MAX}):</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {words.map((w,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{background:"#FFF3E0",border:"2px solid #FFB74D",borderRadius:12,padding:"3px 10px",fontSize:16,fontWeight:600,color:"#E65100"}}>{w}</span>
            <button onClick={()=>removeWord(i)} style={{width:24,height:24,borderRadius:12,border:"none",background:"#FFCDD2",color:"#F44336",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>×</button>
          </div>)}
        </div>
      </div>}

      {words.length>=1&&<button onClick={startReview} style={{...S.primaryBtn,background:full?"#4CAF50":"#78909C",marginTop:4,fontSize:full?20:16}}>
        {full?"📋 ¡Listo! Pedir revisión":"📋 Revisar ahora ({0} de {MAX})".replace("{0}",words.length).replace("{MAX}",MAX)}
      </button>}
    </div>
  </div>;
}

function ImageWordMatch({onBack}){const[items,setItems]=useState(()=>shuffle(IMAGE_WORDS).slice(0,10));const[ci,setCi]=useState(0);const[sel,setSel]=useState(null);const[score,setScore]=useState(0);const[showC,setShowC]=useState(false);const cur=items[ci];const hSel=(o)=>{if(sel)return;setSel(o);if(o===cur.word){setScore(p=>p+1);if(ci===items.length-1){setShowC(true);setTimeout(()=>setShowC(false),2500);}}setTimeout(()=>{if(ci<items.length-1){setCi(p=>p+1);setSel(null);}},1200);};const reset=()=>{setItems(shuffle(IMAGE_WORDS).slice(0,10));setCi(0);setScore(0);setSel(null);};const done=ci===items.length-1&&sel;return<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#E3F2FD 0%,#BBDEFB 100%)",padding:"16px 12px"}}><ConfettiEffect show={showC}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><button onClick={onBack} style={S.backBtn}>← Menú</button><ScoreBar score={score} total={items.length}/></div><div style={{maxWidth:500,margin:"0 auto",textAlign:"center"}}><div style={{marginBottom:12}}><span style={{background:"#1976D2",color:"white",padding:"6px 20px",borderRadius:20,fontSize:16,fontWeight:700}}>¿Cuál es la palabra? ({ci+1}/{items.length})</span></div><div style={{fontSize:100,marginBottom:8}}>{cur.emoji}</div>{sel&&<div style={{fontSize:28,marginBottom:12,animation:"popIn 0.3s ease"}}>{sel===cur.word?"✅ ¡Correcto!":"❌ Intenta de nuevo"}</div>}<div style={{display:"flex",flexDirection:"column",gap:12,maxWidth:320,margin:"0 auto"}}>{cur.options.map((o,i)=><button key={i} onClick={()=>hSel(o)} disabled={sel!==null} style={{padding:"16px 24px",borderRadius:16,fontSize:30,fontWeight:700,letterSpacing:4,border:`3px solid ${sel?(o===cur.word?"#4CAF50":sel===o?"#F44336":"#ddd"):"#1976D2"}`,background:sel?(o===cur.word?"#C8E6C9":sel===o?"#FFCDD2":"white"):"white",color:"#333",cursor:sel?"default":"pointer"}}>{o}</button>)}</div>{done&&<button onClick={reset} style={{...S.primaryBtn,background:"#1976D2",marginTop:24}}>Jugar de nuevo 🔄</button>}</div></div>;}

function SemanticFields({onBack}){const[rounds]=useState(()=>shuffle(SEMANTIC_FIELDS));const[ci,setCi]=useState(0);const[sel,setSel]=useState(null);const[score,setScore]=useState(0);const[showC,setShowC]=useState(false);const cur=rounds[ci];const[allItems]=useState(()=>rounds.map(r=>shuffle([...r.items,r.intruder])));const items=allItems[ci];const hTap=(item)=>{if(sel!==null)return;setSel(item);if(item===cur.intruder){setScore(p=>p+1);if(ci===rounds.length-1){setShowC(true);setTimeout(()=>setShowC(false),2500);}}setTimeout(()=>{if(ci<rounds.length-1){setCi(p=>p+1);setSel(null);}},1500);};const reset=()=>{setCi(0);setScore(0);setSel(null);};const done=ci===rounds.length-1&&sel;return<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#F3E5F5 0%,#E1BEE7 100%)",padding:"16px 12px"}}><ConfettiEffect show={showC}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><button onClick={onBack} style={S.backBtn}>← Menú</button><ScoreBar score={score} total={rounds.length}/></div><div style={{maxWidth:500,margin:"0 auto",textAlign:"center"}}><div style={{marginBottom:12}}><span style={{background:"#9C27B0",color:"white",padding:"6px 20px",borderRadius:20,fontSize:16,fontWeight:700}}>🔍 Encuentra el intruso ({ci+1}/{rounds.length})</span></div><h3 style={{fontSize:24,color:"#6A1B9A",marginBottom:16}}>{cur.category}</h3><p style={{fontSize:16,color:"#888",marginBottom:12}}>¿Cuál NO pertenece al grupo?</p><div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>{items.map((item,i)=>{const isInt=item===cur.intruder;const wasSel=sel===item;let bg="white",bc="#9C27B0";if(sel!==null){if(wasSel&&isInt){bg="#C8E6C9";bc="#4CAF50";}else if(wasSel&&!isInt){bg="#FFCDD2";bc="#F44336";}else if(isInt&&sel!==cur.intruder){bg="#C8E6C9";bc="#4CAF50";}else{bc="#ddd";}}return<button key={i} onClick={()=>hTap(item)} disabled={sel!==null} style={{padding:"14px 10px",borderRadius:16,fontSize:18,fontWeight:600,border:`3px solid ${bc}`,background:bg,color:"#333",cursor:sel?"default":"pointer"}}>{item}</button>})}</div>{sel&&<div style={{marginTop:16,fontSize:24,animation:"popIn 0.3s ease"}}>{sel===cur.intruder?"✅ ¡Correcto!":"❌ Ese sí pertenece al grupo"}</div>}{done&&<button onClick={reset} style={{...S.primaryBtn,background:"#9C27B0",marginTop:20}}>Jugar de nuevo 🔄</button>}</div></div>;}

function NounGame({onBack}){const[words]=useState(()=>{const n=shuffle(NOUN_DATA.nouns).slice(0,8);const nn=shuffle(NOUN_DATA.nonNouns).slice(0,7);return shuffle([...n.map(w=>({word:w,isNoun:true})),...nn.map(w=>({word:w,isNoun:false}))]);});const[tapped,setTapped]=useState({});const[showC,setShowC]=useState(false);const total=words.filter(w=>w.isNoun).length;const score=Object.entries(tapped).filter(([i,v])=>v&&words[i].isNoun).length;const hTap=(i)=>{if(tapped[i]!==undefined)return;setTapped(p=>({...p,[i]:true}));if(words[i].isNoun&&score+1===total){setShowC(true);setTimeout(()=>setShowC(false),2500);}};return<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#E8EAF6 0%,#C5CAE9 100%)",padding:"16px 12px"}}><ConfettiEffect show={showC}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><button onClick={onBack} style={S.backBtn}>← Menú</button><ScoreBar score={score} total={total}/></div><div style={{maxWidth:500,margin:"0 auto",textAlign:"center"}}><span style={{background:"#3F51B5",color:"white",padding:"6px 20px",borderRadius:20,fontSize:16,fontWeight:700}}>📝 Sustantivos</span><div style={{background:"white",borderRadius:20,padding:16,margin:"12px 0",boxShadow:"0 4px 16px rgba(0,0,0,0.08)"}}><p style={{fontSize:16,color:"#555",marginBottom:4}}>Los sustantivos nombran personas, animales, lugares u objetos.</p><p style={{fontSize:18,fontWeight:700,color:"#3F51B5"}}>¡Toca solo los sustantivos!</p></div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>{words.map((w,i)=>{const t=tapped[i];let bg="white",bc="#3F51B5";if(t){if(w.isNoun){bg="#C8E6C9";bc="#4CAF50";}else{bg="#FFCDD2";bc="#F44336";}}return<button key={i} onClick={()=>hTap(i)} disabled={t!==undefined} style={{padding:"14px 8px",borderRadius:16,fontSize:20,fontWeight:600,border:`3px solid ${bc}`,background:bg,color:"#333",cursor:t?"default":"pointer",textTransform:"capitalize"}}>{w.word}</button>})}</div>{score===total&&<div style={{marginTop:20,fontSize:28}}>🎉 ¡Encontraste todos!</div>}</div></div>;}

function MainMenu({onSelect}){const acts=[{id:"vowels",emoji:"🔤",title:"Vocales",desc:"A E I O U",color:"#FF6B6B"},{id:"syl-M",emoji:"Ⓜ️",title:"Sílabas M",desc:"MA ME MI MO MU",color:"#FF6B6B"},{id:"syl-P",emoji:"🅿️",title:"Sílabas P",desc:"PA PE PI PO PU",color:"#4ECDC4"},{id:"syl-L",emoji:"📝",title:"Sílabas L",desc:"LA LE LI LO LU",color:"#FFD93D"},{id:"syl-S",emoji:"⭐",title:"Sílabas S",desc:"SA SE SI SO SU",color:"#6C5CE7"},{id:"syl-T",emoji:"🌮",title:"Sílabas T",desc:"TA TE TI TO TU",color:"#E91E63"},{id:"syl-N",emoji:"☁️",title:"Sílabas N",desc:"NA NE NI NO NU",color:"#00BCD4"},{id:"syl-D",emoji:"🎲",title:"Sílabas D",desc:"DA DE DI DO DU",color:"#FF9800"},{id:"syl-F",emoji:"🔥",title:"Sílabas F",desc:"FA FE FI FO FU",color:"#8BC34A"},{id:"reading",emoji:"📖",title:"Comprensión",desc:"Lee y responde",color:"#4CAF50"},{id:"words",emoji:"🧩",title:"Forma palabras",desc:"Usa las tarjetas",color:"#FF9800"},{id:"imgword",emoji:"🖼️",title:"Imagen-Palabra",desc:"¿Qué palabra es?",color:"#1976D2"},{id:"semantic",emoji:"🔍",title:"El intruso",desc:"Campos semánticos",color:"#9C27B0"},{id:"nouns",emoji:"📝",title:"Sustantivos",desc:"Encuentra nombres",color:"#3F51B5"}];return<div style={{minHeight:"100vh",background:"linear-gradient(180deg,#667eea 0%,#764ba2 100%)",padding:"20px 12px"}}><div style={{textAlign:"center",marginBottom:16,paddingTop:8}}><div style={{fontSize:44,marginBottom:4}}>✨</div><h1 style={{fontSize:28,color:"white",margin:0,textShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>Magic Words</h1><p style={{fontSize:14,color:"rgba(255,255,255,0.85)",margin:"4px 0 0"}}>Primer grado — Elige una actividad</p></div><div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,maxWidth:480,margin:"0 auto",paddingBottom:20}}>{acts.map(a=><button key={a.id} onClick={()=>onSelect(a.id)} style={{background:"white",borderRadius:18,padding:"12px 10px",border:"none",cursor:"pointer",textAlign:"center",boxShadow:"0 4px 16px rgba(0,0,0,0.1)",display:"flex",flexDirection:"column
